;----------------------------------------------------------
;            COLORS
;----------------------------------------------------------

[colors]
rounds =            #1e222a
background =        #aa911a16
text =              #D1D100
background-alt =    #111
foreground =        #fff
foreground-alt =    #555
primary =           #ffb52a
secondary =         #e60053
alert =             #bd2c40

[bar/bar]
width = 100%
height = 15
fixed-center = true

background = ${colors.background}
foreground = ${colors.foreground}


border-size = 4
border-color = ${colors.background}

font-0 = PowerlineSymbols:size=15;4
font-1 = Iosevka:style=Bold:pixelsize=12;1
font-2 = unifont:fontformat=truetype:size=13:antialias=true;


modules-left =      workspaces Rarrow1 xwindow Rarrow1
modules-right =     arrow3 pulseaudio arrow3 memory arrow3 cpu arrow3 wlan arrow3 date arrow3 time arrow3

tray-position = right
tray-padding = 1
tray-background = #e27878

wm-restack = i3

cursor-click = pointer
cursor-scroll = ns-resize

;----------------------------------------------------------
;            M O D U L E S
;----------------------------------------------------------


[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%

[module/workspaces]
type = internal/xworkspaces
pin-workspaces = false
enable-click = true

label-active = %name%
label-active-foreground = ${colors.text}
label-active-underline= ${colors.text}
label-active-padding =1 

[module/cpu]
type = internal/cpu
interval = 2
format-padding = 1
format-prefix-foreground = ${colors.text}
format-foreground = ${colors.text}
label = %percentage:2%%

[module/memory]
type = internal/memory
interval = 6
format-padding = 1
format-prefix-foreground = ${colors.text}
format-foreground = ${colors.text}
label = %mb_used%

[module/wlan]

type = internal/network
interface = ${env:DEFAULT_NETWORK_INTERFACE:wlp8s0} 
interval = 5.0
format-connected-prefix-foreground = ${colors.text}
format-connected = <label-connected>
format-connected-foreground = ${colors.text}
format-connected-padding = 1
label-connected =%downspeed%

format-disconnected =  no connection
label-disconnected-foreground = ${colors.text}

[module/eth]
type = internal/network
interface = %default_interface%
interval = 3.0

format-connected = <label-connected>
format-connected-background = ${colors.rounds}
format-connected-padding = 1
label-connected = %local_ip%


[module/date]
type = internal/date
interval = 1

date =  %Y-%m-%d
label =  %date%
format-padding = 1
label-foreground = ${colors.text}

[module/time]

type = internal/date
interval = 1
format-padding=1
date =  %H:%M
label =  %date%
label-foreground = ${colors.text}

[module/pulseaudio]
type = internal/pulseaudio

format-volume = "<label-volume> <bar-volume> "
label-volume =" %percentage%%"
label-volume-foreground = ${colors.text}

label-muted = muted
label-muted-foreground = #666
bar-volume-width = 6
bar-volume-foreground-0 = ${colors.text}
bar-volume-foreground-1 = ${colors.text}
bar-volume-foreground-2 = ${colors.text}
bar-volume-foreground-3 = ${colors.text}
bar-volume-foreground-4 = ${colors.text}
bar-volume-foreground-5 = #f5a70a
bar-volume-foreground-6 = #ff5555
bar-volume-gradient = false
bar-volume-indicator =  
bar-volume-indicator-font = 2
bar-volume-fill = ─
bar-volume-fill-font = 2
bar-volume-empty = ─
bar-volume-empty-font = 2
bar-volume-empty-foreground = #fff

[settings]
screenchange-reload = true

;----------------------------------------------------------
;            T E X T    M O D U L E S
;----------------------------------------------------------

[module/arrow3]
type = custom/text
content = " "
content-foreground = ${colors.secondary}

[module/Rarrow1]
type = custom/text
content = ""
content-padding = 1
content-foreground = ${colors.secondary}
;content-background = 

